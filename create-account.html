<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Create a Spectr account." />
    <title>Create account | Spectr</title>
    <link rel="icon" href="/assets/brand/spectr-mark.png" type="image/png" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-page create-account-page">
    <div class="auth-shell">
      <main class="auth-main">
        <section class="auth-panel" aria-labelledby="create-account-title">
          <a class="auth-logo" href="index.html" aria-label="Spectr home">
            <img src="assets/brand/spectr-mark.png" width="28" height="28" alt="" />
            <span>Spectr</span>
          </a>

          <p class="auth-kicker">Create account</p>
          <h1 id="create-account-title">Start with your account</h1>
          <p class="auth-copy">Create a Supabase-backed account with only an email and password.</p>

          <p class="auth-message" id="auth-message" role="alert" hidden></p>

          <form class="auth-form" id="create-account-form" autocomplete="on">
            <label class="auth-field">
              <span>Email</span>
              <input id="create-email" type="email" autocomplete="email" placeholder="email@example.com" required />
            </label>
            <label class="auth-field">
              <span>Password</span>
              <input id="create-password" type="password" autocomplete="new-password" placeholder="Create a password" minlength="6" required />
            </label>
            <label class="auth-field">
              <span>Confirm password</span>
              <input id="create-password-confirm" type="password" autocomplete="new-password" placeholder="Confirm password" minlength="6" required />
            </label>
            <button type="submit" class="auth-submit">Create account</button>
          </form>

          <p class="auth-switch">
            Already have an account?
            <a href="login.html">Sign in</a>
          </p>
        </section>

        <aside class="auth-promo" aria-label="Promotion">
          <div class="auth-promo-video" aria-hidden="true">
            <iframe
              src="https://www.youtube-nocookie.com/embed/TGTGWDC3X7I?autoplay=1&mute=1&controls=0&loop=1&playlist=TGTGWDC3X7I&start=2&end=13&playsinline=1&modestbranding=1&rel=0&disablekb=1&fs=0&iv_load_policy=3&cc_load_policy=0&showinfo=0&autohide=1"
              title="Spectr background video"
              allow="autoplay; encrypted-media; picture-in-picture"
              tabindex="-1"
            ></iframe>
          </div>
          <div class="auth-promo-content">
            <h2>Your garage, saved securely.</h2>
            <ul class="auth-promo-list">
              <li>Email and password sign-in</li>
              <li>No two-factor step</li>
              <li>Profile saved in Supabase</li>
            </ul>
          </div>
        </aside>
      </main>

      <footer class="auth-footer">© <span data-current-year></span> SPECTR AS</footer>
    </div>

    <script src="auth-page.js" defer></script>
  </body>
</html>
