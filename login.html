<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign in to Spectr" />
    <title>Spectr</title>
    <link rel="icon" href="/assets/brand/spectr-mark.png" type="image/png" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-page">
    <div class="login-mesh" aria-hidden="true">
      <div class="login-mesh-blob login-mesh-blob--1"></div>
      <div class="login-mesh-blob login-mesh-blob--2"></div>
      <div class="login-mesh-blob login-mesh-blob--3"></div>
      <div class="login-mesh-grain"></div>
    </div>

    <div class="login-shell">
      <header class="login-top">
        <a class="login-logo" href="index.html">
          <img class="login-logo-mark" src="assets/brand/spectr-mark.png" width="28" height="28" alt="" />
          Spectr
        </a>
      </header>

      <main class="login-main">
        <div class="login-card">
          <div class="login-card-logo">
            <img src="assets/brand/spectr-mark.png" width="40" height="40" alt="" />
          </div>

          <h1 class="login-title">Sign in to Spectr</h1>
          <p class="login-subtitle">Operational intelligence for investment teams</p>

          <form class="login-form" id="login-form" action="#" method="post" novalidate>
            <div class="login-field">
              <label for="login-email">Email</label>
              <input
                id="login-email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="you@company.com"
                required
              />
            </div>

            <div class="login-field">
              <label for="login-password">Password</label>
              <input
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="login-row">
              <label class="login-remember">
                <input type="checkbox" name="remember" value="1" />
                Remember me
              </label>
              <a class="login-forgot" href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-submit">Sign in</button>
          </form>

          <div class="login-divider" aria-hidden="true">or</div>

          <p class="login-footer-text">
            New to Spectr?
            <a href="index.html">Contact us</a>
            for access.
          </p>
        </div>
      </main>

      <footer class="login-page-footer">
        <p>
          © <span id="login-year"></span> SPECTR AS ·
          <a href="index.html">Privacy</a>
          ·
          <a href="index.html">Terms</a>
        </p>
      </footer>
    </div>

    <script src="login.js" defer></script>
  </body>
</html>
