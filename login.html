<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign in to Spectr" />
    <title>Spectr</title>
    <link rel="icon" href="/assets/brand/spectr-mark.png" type="image/png" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-page">
    <div class="login-mesh" aria-hidden="true">
      <div class="login-mesh-blob login-mesh-blob--1"></div>
      <div class="login-mesh-blob login-mesh-blob--2"></div>
      <div class="login-mesh-blob login-mesh-blob--3"></div>
      <div class="login-mesh-grain"></div>
    </div>

    <div class="login-shell">
      <header class="login-top">
        <a class="login-logo" href="index.html">
          <img class="login-logo-mark" src="assets/brand/spectr-mark.png" width="28" height="28" alt="" />
          Spectr
        </a>
      </header>

      <main class="login-main">
        <div class="login-card">
          <div class="login-card-logo">
            <img src="assets/brand/spectr-mark.png" width="40" height="40" alt="" />
          </div>

          <h1 class="login-title" id="login-title">Spectr editor sign-in</h1>
          <p class="login-subtitle" id="login-subtitle">Sign in to add and edit company profiles</p>

          <div class="login-tabs" id="login-tabs" role="tablist" aria-label="Account" hidden>
            <button
              type="button"
              class="login-tab is-active"
              id="tab-signin"
              role="tab"
              aria-selected="true"
              aria-controls="panel-signin"
            >
              Sign in
            </button>
          </div>

          <p class="login-message" id="login-message" role="alert" hidden></p>

          <div id="panel-signin" role="tabpanel" aria-labelledby="tab-signin">
            <form class="login-form" id="signin-form" novalidate>
              <div class="login-field">
                <label for="signin-email">Email or username</label>
                <input
                  id="signin-email"
                  name="email"
                  type="text"
                  autocomplete="username"
                  placeholder="makwan or you@company.com"
                  required
                />
              </div>
              <div class="login-field">
                <label for="signin-password">Password</label>
                <input
                  id="signin-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  required
                />
              </div>
              <div class="login-row">
                <label class="login-remember">
                  <input type="checkbox" id="signin-remember" name="remember" value="1" />
                  Remember me
                </label>
                <button type="button" class="login-forgot" id="forgot-password-btn">Forgot password?</button>
              </div>
              <button type="submit" class="login-submit" id="signin-submit">Sign in</button>
            </form>
          </div>

          <div id="panel-signup" role="tabpanel" aria-labelledby="tab-signup" hidden>
            <form class="login-form" id="signup-form" novalidate>
              <div class="login-field">
                <label for="signup-username">Username</label>
                <input
                  id="signup-username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  placeholder="jane_doe"
                  minlength="3"
                  maxlength="32"
                  pattern="[a-zA-Z0-9_]+"
                  required
                />
                <span class="login-hint">3–32 characters · letters, numbers, underscore</span>
              </div>
              <div class="login-field">
                <label for="signup-email">Email</label>
                <input
                  id="signup-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@company.com"
                  required
                />
              </div>
              <div class="login-field">
                <label for="signup-password">Password</label>
                <input
                  id="signup-password"
                  name="password"
                  type="password"
                  autocomplete="new-password"
                  placeholder="At least 8 characters"
                  minlength="8"
                  required
                />
              </div>
              <div class="login-field">
                <label for="signup-password-confirm">Confirm password</label>
                <input
                  id="signup-password-confirm"
                  name="password_confirm"
                  type="password"
                  autocomplete="new-password"
                  placeholder="••••••••"
                  minlength="8"
                  required
                />
              </div>
              <button type="submit" class="login-submit" id="signup-submit">Create account</button>
            </form>
          </div>

          <div id="panel-forgot" hidden>
            <p class="login-forgot-copy">Enter your email and we will send a password reset link.</p>
            <form class="login-form" id="forgot-form" novalidate>
              <div class="login-field">
                <label for="forgot-email">Email</label>
                <input
                  id="forgot-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@company.com"
                  required
                />
              </div>
              <button type="submit" class="login-submit" id="forgot-submit">Send reset link</button>
              <button type="button" class="login-back" id="forgot-back">Back to sign in</button>
            </form>
          </div>
        </div>
      </main>

      <footer class="login-page-footer">
        <p>
          © <span id="login-year"></span> SPECTR AS ·
          <a href="index.html">Privacy</a>
          ·
          <a href="index.html">Terms</a>
        </p>
      </footer>
    </div>

    <script src="analytics-static.js" defer></script>
    <script src="auth-session.js" defer></script>
    <script src="login.js" defer></script>
  </body>
</html>
