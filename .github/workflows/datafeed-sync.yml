# Optional: triggers production datafeed on Vercel when CRON_SECRET is set in GitHub.
# Vercel Cron (vercel.json) runs the sync even if this workflow skips — no GitHub secrets required.

name: Datafeed sync

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/datafeed-sync.yml"
      - "vercel.json"
      - "server/datafeed/**"
      - "server/euronext/**"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      markets:
        description: "Euronext markets (comma-separated)"
        type: string
        default: "oslo"
      finnhub_limit:
        description: "Finnhub quote refresh limit"
        type: number
        default: 80

jobs:
  trigger-vercel-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/datafeed/sync on spectr.no
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::warning::CRON_SECRET is not set in GitHub Actions — skipping remote trigger."
            echo "Datafeed still runs on Vercel Cron (see vercel.json). To enable this job:"
            echo "  GitHub repo → Settings → Secrets and variables → Actions → New secret"
            echo "  Name: CRON_SECRET  Value: same as Vercel → Project → Environment Variables"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Manual run requires CRON_SECRET (see above)."
              exit 1
            fi
            exit 0
          fi
          MARKETS="${{ github.event.inputs.markets || 'oslo' }}"
          FINNHUB_LIMIT="${{ github.event.inputs.finnhub_limit || 80 }}"
          URL="https://www.spectr.no/api/datafeed/sync?sources=euronext,finnhub&markets=${MARKETS}&finnhubLimit=${FINNHUB_LIMIT}"
          echo "GET $URL"
          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/datafeed-response.json \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$URL")
          echo "HTTP $HTTP"
          head -c 4000 /tmp/datafeed-response.json || true
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "::error::Datafeed sync returned HTTP $HTTP"
            cat /tmp/datafeed-response.json 2>/dev/null || true
            exit 1
          fi

      - name: Check datafeed status
        continue-on-error: true
        run: curl -fsSL "https://www.spectr.no/api/datafeed/status" | head -c 2000 || true
