# Keeps the market datafeed alive: Euronext screeners + optional agent-browser scrapes.
# Vercel cron handles lightweight daily sync; this workflow runs fuller syncs with Chrome.

name: Datafeed sync

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/datafeed-sync.yml"
      - "scripts/sync-datafeed.js"
      - "server/datafeed/**"
      - "server/euronext/**"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      scrape_pages:
        description: "Scrape instrument HTML with agent-browser"
        type: boolean
        default: false
      max_page_scrapes:
        description: "Max instrument pages per Oslo run"
        type: number
        default: 25

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install agent-browser (optional Chrome scraper)
        run: |
          npm install agent-browser --no-save || true
          npx agent-browser install --with-deps || echo "agent-browser install skipped"

      - name: Sync Euronext + Finnhub into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          ARGS="--sources euronext,finnhub --finnhub-limit 200"
          if [ "${{ github.event.inputs.scrape_pages }}" = "true" ]; then
            ARGS="$ARGS --scrape-pages --max ${{ github.event.inputs.max_page_scrapes || 25 }} --markets oslo"
          fi
          node scripts/sync-datafeed.js $ARGS

      - name: Ping production status (optional)
        run: |
          curl -fsSL "https://www.spectr.no/api/datafeed/status" | head -c 2000 || true
