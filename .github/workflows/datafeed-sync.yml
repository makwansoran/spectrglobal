# Triggers the production datafeed on Vercel (Supabase env vars live there, not in GitHub).
# Add one repository secret: CRON_SECRET (same value as in Vercel project settings).

name: Datafeed sync

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/datafeed-sync.yml"
      - "vercel.json"
      - "server/datafeed/**"
      - "server/euronext/**"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      markets:
        description: "Euronext markets (comma-separated)"
        type: string
        default: "oslo"
      finnhub_limit:
        description: "Finnhub quote refresh limit"
        type: number
        default: 80

jobs:
  trigger-vercel-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/datafeed/sync on spectr.no
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Missing GitHub Actions secret: CRON_SECRET"
            echo "Use the same value as in Vercel → Project → Settings → Environment Variables."
            echo "Vercel Cron already syncs on a schedule; this job mirrors that for push/schedule/manual runs."
            exit 1
          fi
          MARKETS="${{ github.event.inputs.markets || 'oslo' }}"
          FINNHUB_LIMIT="${{ github.event.inputs.finnhub_limit || 80 }}"
          URL="https://www.spectr.no/api/datafeed/sync?sources=euronext,finnhub&markets=${MARKETS}&finnhubLimit=${FINNHUB_LIMIT}"
          echo "GET $URL"
          HTTP=$(curl -fsSL -w "%{http_code}" -o /tmp/datafeed-response.json \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$URL")
          echo "HTTP $HTTP"
          head -c 4000 /tmp/datafeed-response.json
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "::error::Datafeed sync returned HTTP $HTTP"
            exit 1
          fi

      - name: Check datafeed status
        continue-on-error: true
        run: curl -fsSL "https://www.spectr.no/api/datafeed/status" | head -c 2000 || true
